name: document-writer
description: "Technical documentation generation specialist"
version: "1.0.0"
mode: subagent

# =============================================================================
# CODEX COMPLIANCE
# =============================================================================
# Document writing must follow these Codex rules:
# - Term 34: Documentation Updates - comprehensive documentation
# - Term 18: Meaningful Naming - clear section and document names
# - Term 20: Consistent Code Style - consistent formatting
# - Term 42: Code Review Standards - peer review for documentation
# - Term 3: Do Not Over-Engineer - clear, concise documentation
# - Term 35: Version Control Best Practices - track document versions

# =============================================================================
# DOCUMENTATION INTEGRATION RESPONSIBILITIES
# =============================================================================
# When generating documentation, you MUST:
#
# 1. FULL DOCUMENTATION ECOSYSTEM:
#    - Update README.md with new features or major changes
#    - Update AGENTS.md when agent capabilities change
#    - Update CHANGELOG.md for version changes
#    - Cross-reference all related documentation
#    - Maintain consistency across all docs
#
# 2. INTEGRATION VERIFICATION:
#    - Check all internal links are valid
#    - Verify code examples work
#    - Ensure file paths are correct
#    - Validate markdown formatting
#    - Check image/asset references
#
# 3. COMPLETENESS REQUIREMENTS:
#    - No placeholder text or incomplete sections
#    - All features documented
#    - API endpoints fully documented
#    - Configuration options explained
#    - Usage examples provided
#
# 4. MULTI-FILE COORDINATION:
#    - Update all affected docs in single session
#    - Ensure version numbers consistent
#    - Sync changes across README, AGENTS, CHANGELOG
#    - Update table of contents if structure changes
#
# NEVER submit partial documentation or leave docs inconsistent with code.

# Logging Configuration
logging:
  level: warn
  format: json
  destinations:
    - console
    - file
  retention_days: 30
  sensitive_data_filtering: true
  audit_trail: true

# Processor Pipeline Configuration
processor_pipeline:
  - name: content-analysis
    type: analysis
    priority: high
    timeout_ms: 10000
    retry_attempts: 2
  - name: document-structure
    type: planning
    priority: high
    timeout_ms: 8000
    retry_attempts: 2
  - name: content-generation
    type: generation
    priority: critical
    timeout_ms: 25000
    retry_attempts: 2
  - name: formatting-validation
    type: validation
    priority: medium
    timeout_ms: 5000
    retry_attempts: 1

# Agent Capabilities
capabilities:
  - api-documentation
  - readme-generation
  - code-commenting
  - guide-creation
  - changelog-generation
  - technical-writing
  - markdown-formatting

# Error Handling Configuration
error_handling:
  retry_attempts: 2
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    recovery_timeout_ms: 15000
  fallback_strategy: graceful
  alert_on_failure: true

# Performance Configuration
performance:
  timeout_ms: 30000
  concurrency_limit: 3
  memory_limit_mb: 128
  cpu_limit_percent: 30

# Integration Hooks
integration:
  pre_generation_validation: true
  post_generation_format_check: true
  style_consistency_check: true

# Security Configuration
security:
  sandboxed_execution: true
  permission_level: standard
  data_classification: internal
  encryption_required: false

# Monitoring Configuration
monitoring:
  metrics_collection: true
  health_checks: true
  performance_tracking: true
  alert_thresholds:
    response_time_ms: 25000
    error_rate_percent: 3
    memory_usage_mb: 100
