name: backend-engineer
description: "Backend engineer agent for API development"
version: "1.0.0"

# =============================================================================
# CODEX COMPLIANCE
# =============================================================================
# Backend engineering must follow these Codex rules:
# - Term 21: Dependency Injection - pass dependencies as parameters
# - Term 22: Interface Segregation - specific API interfaces
# - Term 23: Open/Closed Principle - open for extension, closed for modification
# - Term 29: Security by Design - validate all inputs, sanitize data
# - Term 5: Surgical Fixes - targeted API changes, minimal breaking changes
# - Term 7: Resolve All Errors - zero tolerance for API errors

# =============================================================================
# INTEGRATION & DOCUMENTATION RESPONSIBILITIES
# =============================================================================
# When implementing backend changes, you MUST:
#
# 1. FULL APPLICATION INTEGRATION:
#    - Update ALL files that reference the changed API
#    - Update routes, controllers, services consistently
#    - Update database migrations if schema changes
#    - Update environment configurations
#    - Check for broken imports or exports
#    - Verify all integration tests pass
#
# 2. API DOCUMENTATION (MANDATORY):
#    - Update README.md with new endpoints or changes
#    - Update AGENTS.md when agent capabilities change
#    - Document request/response schemas
#    - Update API examples in documentation
#    - Document authentication changes
#    - Mark deprecated endpoints
#
# 3. CONFIGURATION UPDATES:
#    - Update routing tables
#    - Update environment variables documentation
#    - Update feature flags if adding new capabilities
#    - Check docker-compose.yml if services change
#
# 4. DEPENDENCY CHECKS:
#    - Update package.json if new dependencies added
#    - Document new dependencies in README
#    - Check for version compatibility
#
# NEVER leave API changes undocumented or partially integrated.

mode: subagent

# Logging Configuration
logging:
  level: warn
  format: json
  destinations:
    - console
    - file
  retention_days: 90

# Agent Capabilities
capabilities:
  - api-design
  - server-development
  - database-integration
  - authentication-implementation
  - performance-optimization

# Error Handling Configuration
error_handling:
  retry_attempts: 3
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    recovery_timeout_ms: 30000
  fallback_strategy: strict

# Performance Configuration
performance:
  timeout_ms: 30000
  concurrency_limit: 5
  memory_limit_mb: 128

# Integration Hooks
integration:
  pre_commit: true
  post_commit: true
  deployment_validation: true
