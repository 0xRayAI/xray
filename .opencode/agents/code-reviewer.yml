name: code-reviewer
description: "Code reviewer agent for quality assessment and compliance validation"
version: "1.0.0"

# =============================================================================
# CODEX COMPLIANCE
# =============================================================================
# Code review must enforce these Codex rules:
# - Term 11: Type Safety First - no @ts-ignore, no any types
# - Term 7: Resolve All Errors - no unresolved errors
# - Term 39: Avoid Syntax Errors - code must compile
# - Term 32: Proper Error Handling - never ignore errors
# - Term 48: Regression Prevention - preserve functionality
# - Term 46: Import Consistency - consistent imports

# =============================================================================
# CODE REVIEW RESPONSIBILITIES
# =============================================================================
# When reviewing code changes, the code-reviewer MUST verify:
#
# 1. FULL INTEGRATION CHECK:
#    - All files modified consistently across the codebase
#    - No orphaned imports or exports
#    - All integration points properly connected
#    - Configuration files updated if needed
#    - Routing and paths updated throughout
#
# 2. DOCUMENTATION UPDATES (BLOCKING ISSUE):
#    - README.md updated for new features or behavioral changes
#    - AGENTS.md updated when agent capabilities change
#    - CHANGELOG.md updated with user-facing changes
#    - API documentation updated for endpoint changes
#    - Configuration docs updated if settings change
#    - ALWAYS reject code that lacks required documentation updates
#
# 3. CROSS-REFERENCE VALIDATION:
#    - Verify all referenced files exist
#    - Check for broken links in documentation
#    - Ensure consistent naming across docs and code
#    - Validate code examples in documentation
#
# 4. COMPLETENESS CHECK:
#    - No TODO comments in production code
#    - No placeholder implementations
#    - All functionality fully implemented
#    - All error paths handled
#
# REJECTION CRITERIA:
# - Code that changes behavior without updating README
# - New features without documentation
# - API changes without updating AGENTS.md or API docs
# - Partial implementations
# - Missing integration points

mode: subagent

# Logging Configuration
logging:
  level: warn
  format: json
  destinations:
    - console
    - file
    - monitoring
  retention_days: 90
  sensitive_data_filtering: true
  audit_trail: true

# Processor Pipeline Configuration
processor_pipeline:
  - name: quality-assessment
    type: validation
    priority: high
    timeout_ms: 15000
    retry_attempts: 2
  - name: compliance-validation
    type: validation
    priority: critical
    timeout_ms: 10000
    retry_attempts: 3
  - name: security-review
    type: analysis
    priority: high
    timeout_ms: 12000
    retry_attempts: 2
  - name: performance-impact
    type: analysis
    priority: medium
    timeout_ms: 8000
    retry_attempts: 1

# Agent Capabilities
capabilities:
  - code_quality_assessment
  - compliance_validation
  - security_review
  - performance_analysis
  - documentation_review
  - best_practices_enforcement

# Error Handling Configuration
error_handling:
  retry_attempts: 3
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    recovery_timeout_ms: 30000
  fallback_strategy: strict
  alert_on_failure: true

# Performance Configuration
performance:
  timeout_ms: 25000
  concurrency_limit: 5
  memory_limit_mb: 128
  cpu_limit_percent: 30

# Integration Hooks
integration:
  pre_commit: true
  post_commit: true
  daily_scan: true
  deployment_validation: true
  webhook_endpoints:
    - url: "https://compliance-monitoring.example.com/webhook"
      events: ["policy_violation", "threshold_exceeded"]

# Security Configuration
security:
  sandboxed_execution: true
  permission_level: elevated
  data_classification: internal
  encryption_required: false

# Monitoring Configuration
monitoring:
  metrics_collection: true
  health_checks: true
  performance_tracking: true
  alert_thresholds:
    response_time_ms: 20000
    error_rate_percent: 2
    memory_usage_mb: 100
