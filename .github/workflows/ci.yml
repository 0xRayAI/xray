name: StringRay CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"  # Daily at 8 AM UTC

env:
  NODE_VERSION: "20.x"

jobs:
  # ═══════════════════════════════════════════════════════
  # Docs Build Validation
  # ═══════════════════════════════════════════════════════
  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'docs') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        run: cd docs-site && npm ci

      - name: Build docs site
        run: cd docs-site && npm run build

      - name: Upload docs artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: docs-site/build/
          retention-days: 7

  # ═══════════════════════════════════════════════════════
  # Quality Checks
  # ═══════════════════════════════════════════════════════
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ═══════════════════════════════════════════════════════
  # Unit Tests
  # ═══════════════════════════════════════════════════════
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:all

      - name: Run unit tests
        run: npm test

  # ═══════════════════════════════════════════════════════
  # Pipeline Tests (gated: schedule, needs-pipeline, or ci:full)
  # ═══════════════════════════════════════════════════════
  test-pipeline:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    needs: test-unit
    if: |
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'needs-pipeline') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:all

      - name: Run pipeline tests
        run: npm run test:pipelines

  # ═══════════════════════════════════════════════════════
  # Consumer Package Test (gated: schedule, needs-pipeline, or ci:full)
  # ═══════════════════════════════════════════════════════
  test-package:
    name: Package Installation
    runs-on: ubuntu-latest
    needs: test-pipeline
    if: |
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'needs-pipeline') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: |
          npm run build:all
          npm pack

      - name: Create test project
        run: |
          mkdir -p test-install
          cd test-install
          npm init -y
          npm install ../0xray-*.tgz

      - name: Run postinstall
        run: |
          cd test-install
          rm -f ~/.hermes  # Ensure Hermes isn't detected in CI
          node node_modules/0xray/scripts/node/postinstall.cjs 2>/dev/null || true

      - name: Validate postinstall
        env:
          CI: "true"
        run: |
          cd test-install
          # Verify package was installed
          ls node_modules/0xray/package.json || exit 1
          # Verify postinstall output contains correct version string
          POST_OUTPUT=$(node node_modules/0xray/scripts/node/postinstall.cjs 2>/dev/null || true)
          echo "$POST_OUTPUT" | grep -q "xray v3 framework installed" || { echo "❌ postinstall shows wrong version"; echo "$POST_OUTPUT"; exit 1; }
          echo "✅ Package installed successfully"

      - name: Validate MCP
        env:
          CI: "true"
        run: |
          cd test-install
          node node_modules/0xray/scripts/mjs/validate-mcp-connectivity.cjs || true

  # ═══════════════════════════════════════════════════════
  # Security Audit (gated: schedule, needs-pipeline, or ci:full)
  # ═══════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test-package
    if: |
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'needs-pipeline') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

  # ═══════════════════════════════════════════════════════
  # npm Pack Smoke Test (always runs — validates the packaged artifact)
  # ═══════════════════════════════════════════════════════
  smoke-test-package:
    name: npm Pack Smoke Test
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build:all
      - name: Pack and validate
        run: |
          # Pack
          TARBALL=$(npm pack 2>/dev/null | tail -1)
          echo "Tarball: $TARBALL"

          # Create consumer project
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y
          npm install "$GITHUB_WORKSPACE/$TARBALL"

          # Validate package ships correctly
          echo "=== Validate package structure ==="
          PKG="node_modules/0xray"
          [ -f "$PKG/package.json" ] && echo "OK: package.json"
          [ -f "$PKG/dist/cli/index.js" ] && echo "OK: CLI entry"
          [ -d "$PKG/xray" ] && echo "OK: xray/ config dir"
          [ -f "$PKG/xray/features.json" ] && echo "OK: features.json"
          [ -f "$PKG/xray/codex.json" ] && echo "OK: codex.json"
          [ -f "$PKG/scripts/node/setup.cjs" ] && echo "OK: setup.cjs"

          # Validate CLI runs
          echo "=== Validate CLI ==="
          npx 0xray --help 2>&1 | head -5

          # Validate setup
          echo "=== Validate setup ==="
          node "$PKG/scripts/node/setup.cjs" 2>&1 | tail -3

          # Validate logs dir created
          echo "=== Validate logs dir ==="
          [ -d "$(pwd)/logs/framework" ] && echo "OK: logs/framework/ exists"

          echo "✅ Smoke test passed"

  # ═══════════════════════════════════════════════════════
  # Dead File Detection
  # ═══════════════════════════════════════════════════════
  check-orphaned-files:
    name: Dead File Detection
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: Detect orphaned files
        run: |
          for f in src/**/*.ts; do
            count=$(grep -rl "$(basename "$f" .ts)" src/ --include='*.ts' --include='*.mjs' | grep -v "$f" | wc -l)
            if [ "$count" -eq 0 ] && [[ ! "$f" =~ "__tests__" ]] && [[ ! "$f" =~ "\.d\.ts" ]]; then
              echo "POSSIBLY ORPHANED: $f"
            fi
          done

  # ═══════════════════════════════════════════════════════
  # Codex Enforcement Gate
  # ═══════════════════════════════════════════════════════
  enforcement:
    name: Codex Enforcement
    runs-on: ubuntu-latest
    needs: [quality, test-unit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Run Codex Enforcement Check (all 29 validators)
        run: |
          echo "Running all 29 validators via ValidatorRegistry (bypassing bridge.mjs snippet-safe filter)..."
          node scripts/ci/enforce-validators.mjs --all

      - name: Coverage Gate Check (term 75)
        run: |
          echo "Running vitest coverage check with thresholds (statements: 60%, branches: 50%, functions: 55%, lines: 60%)..."
          npx vitest run --coverage --reporter=verbose 2>&1 | tail -20 || {
            echo "❌ Coverage gate failed — thresholds not met. See vitest output above."
            exit 1
          }
          echo "✅ Coverage gate passed (term 75)"

      - name: Consumer Package Enforcement Check (term 76 — PR CI)
        run: |
          PROJECT_ROOT="${{ github.workspace }}"
          echo "--- Pack consumer tarball ---"
          TARBALL=$(cd "$PROJECT_ROOT" && npm pack 2>/dev/null | tail -1)
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y
          npm install "$PROJECT_ROOT/$TARBALL"
          PKG="$TMPDIR/node_modules/0xray"

          echo "--- ValidatorRegistry load test ---"
          node --input-type=module -e "
            const mod = await import('$PKG/dist/enforcement/validators/validator-registry.js');
            const reg = mod.globalValidatorRegistry;
            if (!reg) { console.error('FAIL: no registry'); process.exit(1); }
            const v = reg.getAllValidators();
            console.log('OK: ' + v.length + ' validators loaded');
            if (v.length !== 29) { console.error('FAIL: expected 29, got ' + v.length); process.exit(1); }
            console.log('ALL 29 VALIDATORS PRESENT');
          "

          echo "--- Enforcement gate load test ---"
          node --input-type=module -e "
            const { beforeToolHook, afterToolHook } = await import('$PKG/dist/integrations/enforcement-gate.js');
            const r1 = await beforeToolHook('write', { filePath: 'test.ts', content: 'const x = 1;' });
            console.log('beforeToolHook: allowed=' + r1.allowed + ' resonance=' + r1.resonance);
            if (!r1.allowed || r1.resonance <= 0) throw new Error('beforeToolHook unexpected');
            const r2 = await afterToolHook('write', { filePath: 'test.ts', content: 'const x = 1;' }, null, null);
            console.log('afterToolHook: processed=' + r2.processed + ' violations=' + r2.violations.length);
            if (r2.processed !== true || r2.violations.length > 0) throw new Error('afterToolHook unexpected');
            console.log('Consumer gate verification PASSED');
          "

          echo "--- Cleanup ---"
          rm -f "$PROJECT_ROOT/$TARBALL"
          echo "✅ Consumer package enforcement check passed (term 76)"

      - name: E2E Pipeline Smoke Test (hook → gate → escalation → CI → consumer)
        run: |
          echo "Running full E2E pipeline smoke test..."
          node scripts/ci/e2e-pipeline-smoke.mjs
          echo "✅ E2E pipeline smoke test passed (term 76/77/78/79/80/81)"

      - name: Compat Shim Scanner (Term 78)
        run: |
          echo "Scanning for stale compat shims..."
          node scripts/ci/compat-shim-scanner.mjs || {
            echo "⚠️  Compat shims detected — review for removal (non-blocking)"
          }
          echo "✅ Compat shim scan complete"

      - name: Orphan Code Pre-PR Check (Term 73)
        run: |
          echo "Checking for orphan code deletion protocol violations..."
          node scripts/ci/orphan-code-pre-pr-check.mjs --base origin/${{ github.event.pull_request.base.ref || 'master' }}
          echo "✅ Orphan code check complete"

      - name: Source-Change Governance Detector (Phase 1)
        if: github.event_name == 'pull_request'
        run: |
          echo "Detecting governance-interest file changes..."
          node scripts/ci/source-change-governance-detector.mjs --apply
          echo "✅ Source-change governance detection complete"

  # ═══════════════════════════════════════════════════════
  # CI/CD Health Monitor (runs after all jobs)
  # ═══════════════════════════════════════════════════════
  ci-health:
    name: CI Health Monitor
    runs-on: ubuntu-latest
    needs: [ci-summary, docs-build]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Run health monitor
        run: node scripts/node/ci-cd-auto-fix.cjs

      - name: Auto-generate reflection on failure
        if: failure()
        run: |
          echo "CI failed - auto-generating reflection stub"
          node scripts/node/auto-reflection-generator.mjs --trigger ci-failure --title "CI failure investigation"
          
          # Commit the reflection stub
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/reflections/auto-ci-*.md 2>/dev/null || true
          git commit -m "docs: auto-generated reflection stub for CI failure" 2>/dev/null || true
          git push 2>/dev/null || true

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: ci-health-report
          path: .opencode/logs/ci-cd-monitor-report.json

  # ═══════════════════════════════════════════════════════
  # CI Summary Job (single required status check)
  # ═══════════════════════════════════════════════════════
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, test-unit, smoke-test-package, enforcement]
    if: always()
    steps:
      - name: Check required jobs status
        run: |
          echo "Quality: ${{ needs.quality.result }}"
          echo "Unit Tests: ${{ needs.test-unit.result }}"
          echo "Smoke Test Package: ${{ needs.smoke-test-package.result }}"
          echo "Codex Enforcement: ${{ needs.enforcement.result }}"

          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.test-unit.result }}" != "success" ] || \
             [ "${{ needs.smoke-test-package.result }}" != "success" ] || \
             [ "${{ needs.enforcement.result }}" != "success" ]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          echo "✅ All required CI checks passed"
