name: StringRay CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"  # Daily at 8 AM UTC

env:
  NODE_VERSION: "20.x"

jobs:
  # ═══════════════════════════════════════════════════════
  # Quality Checks
  # ═══════════════════════════════════════════════════════
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ═══════════════════════════════════════════════════════
  # Unit Tests
  # ═══════════════════════════════════════════════════════
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:all

      - name: Run unit tests
        run: npm test

  # ═══════════════════════════════════════════════════════
  # Pipeline Tests
  # ═══════════════════════════════════════════════════════
  test-pipeline:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:all

      - name: Run pipeline tests
        run: npm run test:pipelines

  # ═══════════════════════════════════════════════════════
  # Consumer Package Test
  # ═══════════════════════════════════════════════════════
  test-package:
    name: Package Installation
    runs-on: ubuntu-latest
    needs: test-pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: |
          npm run build:all
          npm pack

      - name: Create test project
        run: |
          mkdir -p test-install
          cd test-install
          npm init -y
          npm install ../strray-ai-*.tgz

      - name: Run postinstall
        run: |
          cd test-install
          node node_modules/strray-ai/scripts/node/postinstall.cjs

      - name: Validate postinstall
        run: |
          cd test-install
          node node_modules/strray-ai/scripts/mjs/validate-postinstall-config.mjs

      - name: Validate MCP
        run: |
          cd test-install
          node node_modules/strray-ai/scripts/mjs/validate-mcp-connectivity.cjs

  # ═══════════════════════════════════════════════════════
  # Security Audit
  # ═══════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test-package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

  # ═══════════════════════════════════════════════════════
  # CI/CD Health Monitor (runs after all jobs)
  # ═══════════════════════════════════════════════════════
  ci-health:
    name: CI Health Monitor
    runs-on: ubuntu-latest
    needs: [quality, test-unit, test-pipeline, test-package, security]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Run health monitor
        run: node scripts/node/ci-cd-auto-fix.cjs

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: ci-health-report
          path: .opencode/logs/ci-cd-monitor-report.json
