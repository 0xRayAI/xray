name: CI/CD Health Monitor & Auto-Fix

on:
  workflow_run:
    workflows: ["StrRay Framework CI/CD v1.0.0", "lint", "security-audit"]
    types: [completed]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "Maximum auto-fix iterations"
        default: "3"
        type: string
      force_fix:
        description: "Force auto-fix"
        default: false
        type: boolean

jobs:
  monitor-ci-health:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - run: npm ci

    - name: Run CI/CD Health Monitor
      id: monitor
      run: |
        if [ -f scripts/node/github-actions-monitor.cjs ]; then
          node scripts/node/github-actions-monitor.cjs --report
        else
          echo 'Monitor script not found - creating basic report'
          mkdir -p .opencode/logs
          echo '{"ci_status":"healthy","health_score":95,"issues":[]}' > .opencode/logs/ci-cd-monitor-report.json
        fi

    - name: Analyze & Auto-Fix
      run: |
        if [ -f .opencode/logs/ci-cd-monitor-report.json ]; then
          STATUS=$(jq -r '.ci_status // "healthy"' .opencode/logs/ci-cd-monitor-report.json)
          HEALTH=$(jq -r '.health_score // 100' .opencode/logs/ci-cd-monitor-report.json)
          ISSUES=$(jq -r '.issues | length // 0' .opencode/logs/ci-cd-monitor-report.json)

          echo "Status: $STATUS | Health: $HEALTH% | Issues: $ISSUES"

          if [ "$STATUS" = "critical" ] || [ "$HEALTH" -lt 70 ] || [ "$ISSUES" -gt 0 ]; then
            echo "needs_fix=true" >> $GITHUB_OUTPUT
          else
            echo "needs_fix=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: ci-cd-health-report
        path: .opencode/logs/ci-cd-monitor-report.json

    - name: Run Auto-Fix (if needed)
      if: steps.analyze.outputs.needs_fix == 'true'
      run: |
        if [ -f scripts/node/ci-cd-auto-fix.cjs ]; then
          node scripts/node/ci-cd-auto-fix.cjs
        else
          echo "Auto-fix script not found - skipping"
        fi