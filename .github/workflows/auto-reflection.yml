name: Auto-Reflection System

on:
  # Temporarily disabled - workflow_run trigger has issues with conclusion check
  # Re-enable after fixing the trigger logic
  # workflow_run:
  #   workflows: [StringRay CI/CD]
  #   types: [completed]
  #   branches: [master]
  schedule:
    - cron: "0 */6 * *"  # Every 6 hours check for reflection needs
  repository_dispatch:
    types: [reflection-trigger]
  workflow_dispatch:

env:
  REFLECTIONS_DIR: docs/reflections
  NODE_VERSION: "20.x"

jobs:
  # ═══════════════════════════════════════════════════════
  # Periodic Reflection Check (primary job)
  # ═══════════════════════════════════════════════════════
  check-reflection-needed:
    name: Check if Reflection Needed
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Count commits since last reflection
        run: |
          # Find most recent reflection
          LAST_REFLECTION=$(find ${{ env.REFLECTIONS_DIR }} -name "*.md" -type f -exec stat --format="%Y %n" {} \; 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
          
          if [ -z "$LAST_REFLECTION" ]; then
            echo "⚠️ No reflections found in ${{ env.REFLECTIONS_DIR }}"
            echo "commits_since_reflection=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📄 Most recent reflection: $LAST_REFLECTION"
          
          REFLECTION_DATE=$(stat --format="%Y" "$LAST_REFLECTION")
          COUNT=$(git rev-list --count --since="$REFLECTION_DATE" HEAD 2>/dev/null || echo "0")
          echo "commits_since_reflection=$COUNT" >> $GITHUB_OUTPUT
          
          echo "📊 Commits since last reflection: $COUNT"
          
          # Threshold check
          if [ "$COUNT" -gt 20 ]; then
            echo "::warning::More than 20 commits since last reflection - consider writing one!"
            echo "reflection_needed=true" >> $GITHUB_OUTPUT
          else
            echo "reflection_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for test failures
        run: |
          # Check recent test runs
          FAILURES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=failure" | \
            jq -r '.workflow_runs | length')
          
          if [ "$FAILURES" -gt 0 ]; then
            echo "::warning::Found $FAILURES failed workflow run(s)"
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Report status
        run: |
          echo "## Reflection System Status"
          echo ""
          echo "- Commits since last reflection: ${{ steps.count-commits.outputs.commits_since_reflection }}"
          echo "- Reflection needed: ${{ steps.count-commits.outputs.reflection_needed }}"
          echo "- Has failures: ${{ steps.check-failures.outputs.has_failures }}"