name: Publish to NPM

on:
  workflow_dispatch:

jobs:
  preflight-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build plugin
        run: npm run build

      - name: Check required documentation exists
        run: |
          echo "Checking documentation files..."
          ls -la README.md AGENTS.md CHANGELOG.md || exit 1

      - name: Check pipeline tests exist
        run: |
          echo "Checking pipeline tests..."
          ls -la src/__tests__/pipeline/ || exit 1
          count=$(ls src/__tests__/pipeline/*.mjs 2>/dev/null | wc -l)
          echo "Found $count pipeline tests"
          if [ "$count" -lt 3 ]; then
            echo "ERROR: At least 3 pipeline tests required"
            exit 1
          fi

      - name: Check for recent reflections
        run: |
          echo "Checking reflections..."
          if [ ! -d "docs/reflections" ]; then
            echo "ERROR: docs/reflections directory missing"
            exit 1
          fi
          # Check if there's a reflection from last 7 days
          find docs/reflections -name "*.md" -mtime -7 | head -1 || {
            echo "ERROR: No reflections from last 7 days"
            exit 1
          }

      - name: Validate Docusaurus docs build
        run: |
          echo "Building Docusaurus docs to verify no broken links..."
          cd docs-site
          npm ci
          npm run build
          echo "✅ Docs build successful"

  publish:
    needs: preflight-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build plugin
        run: npm run build

      - name: Validate package before publish
        run: npm pack --dry-run

      - name: Run comprehensive tests
        run: npm run test:comprehensive

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'npm',
              description: 'Published 0xray to npm registry'
            });
