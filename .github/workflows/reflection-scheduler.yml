name: Reflection Scheduler

on:
  schedule:
    - cron: "0 */6 * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Count reflections
        run: |
          count=$(find docs/reflections -name "*.md" 2>/dev/null | wc -l)
          echo "Found $count reflection documents"
          echo "reflections_count=$count" >> $GITHUB_OUTPUT

      - name: Report
        run: |
          echo "## Reflection Check"
          echo "Documents: ${{ steps.count.outputs.reflections_count }}"
