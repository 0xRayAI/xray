name: Enforce AGENTS.md

on:
  pull_request:
    branches: [ master ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate AGENTS.md
      run: |
        if [ -f scripts/validate-agents-md.js ]; then
          node scripts/validate-agents-md.js
        else
          echo 'AGENTS.md validation script not found - skipping'
        fi